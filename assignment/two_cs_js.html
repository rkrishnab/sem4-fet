<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radhika | Tech Matrix</title>
    <style>
        /* Dark Theme & Layout */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a; /* Deep Navy */
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .matrix-card {
            background: #1e293b;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 450px;
            border: 1px solid #334155;
        }

        h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: #38bdf8; /* Sky Blue */
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Search Bar Style */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 2rem;
        }

        input {
            flex: 1;
            background: #0f172a;
            border: 1px solid #38bdf8;
            padding: 10px;
            border-radius: 8px;
            color: white;
            outline: none;
        }

        button {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #7dd3fc;
            box-shadow: 0 0 15px #38bdf8;
        }

        /* Skill Grid */
        .skill-item {
            background: #334155;
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 12px;
            transition: 0.4s;
            border-left: 5px solid transparent;
        }

        .skill-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        .bar-bg {
            background: #1e293b;
            height: 6px;
            border-radius: 3px;
        }
