<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radhika | Skill Manager</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; background: #f4f7f6; }
        .card { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 350px; }
        .page { display: none; } .active { display: block; }
        .skill { background: #eee; margin: 5px 0; padding: 8px; border-radius: 4px; display: flex; justify-content: space-between; }
        nav { margin-bottom: 20px; display: flex; gap: 10px; }
        button { cursor: pointer; padding: 8px; background: #007bff; color: #fff; border: none; border-radius: 4px; width: 100%; margin-top: 10px; }
        input { width: 93%; padding: 10px; margin-top: 10px; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <div class="card">
        <nav>
            <button onclick="show('view')">View</button>
            <button onclick="show('add')">Add</button>
        </nav>

        <div id="view" class="page active">
            <h3>My Skills</h3>
            <div id="list"></div>
        </div>

        <div id="add" class="page">
            <h3>Validate New Skill</h3>
            <input type="text" id="input" placeholder="Enter skill (e.g. Python)">
            <button onclick="validate()">Validate & Add</button>
        </div>
    </div>

    <script>
        let mySkills = ["HTML", "CSS", "MySQL"];
        // Only these "Real Skills" are allowed to be added
        const validMasterList = ["JAVASCRIPT", "PYTHON", "JAVA", "REACT", "C++", "PHP", "SWIFT", "DART"];

        function show(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'view') render();
        }

        function render() {
            document.getElementById('list').innerHTML = mySkills.map(s => `<div class="skill">${s} <span>✅</span></div>`).join('');
        }

        function validate() {
            const val = document.getElementById('input').value.trim().toUpperCase();
            const status = (msg) => alert(msg);

            if (mySkills.includes(val)) return status("Already exists!");
            
            // Check if the input exists in our "Approved Tech List"
            if (validMasterList.includes(val)) {
                mySkills.push(val);
                document.getElementById('input').value = "";
                status("Success! Added " + val);
                show('view');
            } else {
                status("Error: '" + val + "' is not a recognized technical skill.");
            }
        }
        render();
    </script>
</body>
</html>
