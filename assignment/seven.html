<html>
  <head>
    <title>Hire Me - Contact Form</title>
  </head>
  <body>

    <h1>Hire Me</h1>
    <h2>Contact Form</h2>
    <p>Fill in the details below and I will get back to you!</p>

    <form>

      <label for="fname">First Name:</label><br>
      <input type="text" id="fname" name="fname" placeholder="Enter your first name"><br><br>

      <label for="lname">Last Name:</label><br>
      <input type="text" id="lname" name="lname" placeholder="Enter your last name"><br><br>

      <label for="email">Email:</label><br>
      <input type="email" id="email" name="email" placeholder="Enter your email"><br><br>

      <label for="subject">Subject:</label><br>
      <select id="subject" name="subject">
        <option value="">-- Select a Subject --</option>
        <option value="job offer">Job Offer</option>
        <option value="internship">Internship Opportunity</option>
        <option value="freelance">Freelance Project</option>
        <option value="collaboration">Collaboration</option>
        <option value="other">Other</option>
      </select><br><br>

      <label for="message">Message:</label><br>
      <textarea id="message" name="message" rows="5" cols="40" placeholder="Write your message here..."></textarea><br><br>

      <input type="submit" value="Send Message"><br>

    </form>

  </body>
</html>
